<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Three RTS Prototype</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div id="res-wood">木材: 0</div>
      <div id="res-gold">黄金: 0</div>
      <div id="res-food">人口: 0/0</div>
    </div>
    <div id="toolbar">
      <button class="tool-btn" id="build-townhall">建造 大本(T)</button>
      <button class="tool-btn" id="build-barracks">建造 兵营(B)</button>
      <button class="tool-btn" id="train-peasant">训练 农民(P)</button>
      <button class="tool-btn" id="train-soldier">训练 步兵(S)</button>
    </div>
    <div id="selection-rect"></div>
    <div id="tooltip"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
